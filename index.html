<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<body>
    <div class="container">
        <div class="header">
            <h1>Rock Paper Scissors</h1>
        </div>
        <div class="content">
            <div class="scoreboard">
                <div class="human-score-container">
                    <p>You:</p>
                    <p id="human-score"></p>
                </div>
                <div class="computer-score-container">
                    <p>Computer:</p>
                    <p id="computer-score"></p>
                </div>
            </div>
            <div class="button-container">
                <button class="choices" data-choice="rock">
                    <img class="rock-image" src="images/rock.png" alt="rock">
                </button>
                <button class="choices" data-choice="paper">
                    <img src="images/paper.png" alt="paper">
                </button>
                <button class="choices" data-choice="scissors">
                    <img src="images/scissors.png" alt="scissors">
                </button>
            </div>
            <div class="game-details-container">
                <p id="computer-choice-text-display"></p>
                <p id="round-winner-text-display"></p>
                <p id="game-winner-text-display"></p>
            </div>
        </div>
        <div class="footer">
            <div class="play-again-button-container">
                <button id="play-again" hidden>Play Again</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
